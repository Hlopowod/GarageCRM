name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the "v" prefix (example: 1.0.1)
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-windows:
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      GARAGE_CRM_UPDATER_ENDPOINT: https://github.com/Hlopowod/GarageCRM/releases/latest/download/latest.json
      GARAGE_CRM_UPDATER_PUBKEY: ${{ secrets.GARAGE_CRM_UPDATER_PUBKEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate release environment
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing GitHub secret TAURI_SIGNING_PRIVATE_KEY"
          }
          if ([string]::IsNullOrWhiteSpace($env:GARAGE_CRM_UPDATER_PUBKEY)) {
            throw "Missing GitHub secret GARAGE_CRM_UPDATER_PUBKEY"
          }

      - name: Resolve release metadata
        id: release
        shell: pwsh
        env:
          RELEASE_VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch") {
            if ([string]::IsNullOrWhiteSpace($env:RELEASE_VERSION_INPUT)) {
              throw "Release version input is required."
            }
            $tag = "v$($env:RELEASE_VERSION_INPUT.Trim())"
            $name = "Garage CRM $tag"
          } else {
            $tag = $env:GITHUB_REF_NAME
            $name = "Garage CRM $tag"
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "name=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: ${{ steps.release.outputs.name }}
          releaseBody: |
            Automatic Garage CRM release.

            Download the installer from the assets below.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
